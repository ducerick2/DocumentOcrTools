<!-- Server Import Modal -->
<div class="modal" id="serverImportModal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3>Import from Server</h3>
            <button class="modal-close" id="closeServerImportModal">&times;</button>
        </div>
        <div class="modal-body">
            <div class="file-browser">
                <div class="browser-toolbar">
                    <button class="btn btn-sm" id="parentDirBtn" title="Go to parent directory">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M10 12l-4-4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        </svg>
                        Up
                    </button>
                    <div class="current-path" id="currentPath">/data/ducbm3/DocumentOCR/dataset_public</div>
                    <button class="btn btn-sm btn-primary" id="selectAllBtn">Select All Images</button>
                </div>

                <div class="browser-content">
                    <div class="browser-list" id="browserList">
                        <!-- Directory items will be inserted here -->
                    </div>
                </div>

                <div class="browser-footer">
                    <div class="selected-count">
                        <span id="selectedCount">0</span> images selected
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="cancelServerImportBtn">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirmServerImportBtn" disabled>Import
                    Selected</button>
            </div>
        </div>
    </div>
</div>
